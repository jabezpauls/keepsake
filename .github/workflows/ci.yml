name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust — check / clippy / fmt / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsodium-dev libheif-dev \
            libavformat-dev libavcodec-dev libavutil-dev \
            libswscale-dev libswresample-dev \
            libavfilter-dev libavdevice-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libssl-dev pkg-config build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        # Argon2 sensitive memlimit (1 GiB) means 4 parallel test workers OOM
        # the default GitHub runner; cap at 2.
        run: cargo test --workspace -- --test-threads=2

      - name: cargo doc
        run: cargo doc --no-deps --workspace

  audit:
    name: cargo audit + deny
    runs-on: ubuntu-latest
    continue-on-error: true
    # `rustsec/audit-check` publishes findings as a check run on the
    # commit; that needs `checks: write`. Without it the action exits
    # with "Resource not accessible by integration" even when the
    # actual audit succeeds.
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo-audit
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  frontend:
    name: Frontend — lint / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
      - name: Install
        run: pnpm --filter app install --frozen-lockfile=false
      - name: Lint
        run: pnpm --filter app lint
      - name: Typecheck
        run: pnpm --filter app typecheck
      - name: Test
        run: pnpm --filter app test

  e2e:
    name: Frontend — Playwright smoke
    runs-on: ubuntu-latest
    needs: frontend
    # Non-blocking until browser install costs are stabilised; the suite is
    # maintained but failures don't gate merges during Phase-1.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
      - name: Install
        run: pnpm --filter app install --frozen-lockfile=false
      - name: Install Playwright browsers
        run: pnpm --filter app exec playwright install --with-deps chromium
      - name: Run smoke
        run: pnpm --filter app test:e2e
