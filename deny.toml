# cargo-deny configuration.
#
# This is the workspace's static-analysis policy: licenses, banned crates,
# advisories, source restrictions. CI's `cargo deny --all-features check`
# enforces it on every PR/push (under `continue-on-error` until everything
# stabilises).

[advisories]
version = 2
yanked = "warn"
# Most "unmaintained" advisories on our tree are transitive (gtk-rs from
# Tauri's webkit2gtk path, paste/proc-macro-error/unic-* from various
# build-time helpers). Surface them as warnings so we know they exist
# without blocking the merge train. Re-tighten to "deny" once upstream
# replacements land.
unmaintained = "workspace"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
    # Our own license: every workspace crate publishes under AGPL-3.0-or-later.
    "AGPL-3.0-or-later",
    # `async_io_stream` (transitive via iroh-relay → ws_stream_wasm).
    "Unlicense",
    # `ffmpeg-next` + `ffmpeg-sys-next`. The Rust bindings are WTFPL even
    # though the underlying ffmpeg C library is LGPL — the crates re-license
    # their own glue. We ship dynamically linked, so the LGPL of ffmpeg
    # itself is satisfied separately.
    "WTFPL",
    # `rawloader` — RAW (CR2/NEF/etc.) decoder. LGPL satisfied by dynamic
    # linking; the crate is a small wrapper around libraw.
    "LGPL-2.1",
    # `webpki-roots` ships with the Mozilla CA bundle under CDLA-Permissive
    # (Common Development License). Read-only data, no copyleft.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
# Crypto-at-rest is libsodium-only — flag any crate that would offer a
# competing primitive for the encryption envelope, key wrapping, or KDF.
#
# Allowed despite touching crypto, because they're transport-layer (never
# applied to the at-rest envelope keys):
# - `rustls` + `ring` back the HTTPS downloader (ureq → rustls → ring) used
#   by the first-run model wizard.
# - `aes-gcm` is iroh's QUIC AEAD (via noq-proto). Sealed by libsodium's
#   own keys *before* the QUIC layer ever sees the bytes.
#
# Kept denied:
# - `openssl-sys`: stops a TLS dep from sneaking the OpenSSL stack in.
# - `pbkdf2`: KDF — libsodium's `crypto_pwhash` (Argon2id) is canonical.
deny = [
    { name = "openssl-sys" },
    { name = "pbkdf2" },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
